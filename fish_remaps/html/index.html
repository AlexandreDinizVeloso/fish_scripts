<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fish Remaps</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app" class="hidden">
        <div class="remap-container">
            <!-- Header -->
            <div class="header">
                <div class="header-left">
                    <div class="logo">FISH<span class="accent">REMAPS</span></div>
                    <div class="version">DNA ENGINE</div>
                </div>
                <div class="header-center">
                    <div class="vehicle-name" id="vehicleName">VEHICLE</div>
                    <div class="plate" id="plateDisplay">PLATE</div>
                </div>
                <div class="header-right">
                    <button class="btn-close" id="btnClose">✕</button>
                </div>
            </div>

            <!-- Main Content -->
            <div class="main-content">
                <!-- Left: DNA Visualization -->
                <div class="panel dna-panel">
                    <div class="panel-title">DNA INHERITANCE</div>

                    <!-- DNA Blend Visualization -->
                    <div class="dna-visual">
                        <div class="dna-helix">
                            <div class="dna-strand original" id="dnaOriginal">
                                <div class="dna-label">ORIGINAL</div>
                                <div class="dna-archetype" id="originalArchLabel">Esportivo</div>
                                <div class="dna-percent">25%</div>
                            </div>
                            <div class="dna-blend-indicator">
                                <div class="blend-arrow">⟶</div>
                                <div class="blend-value">75% / 25%</div>
                            </div>
                            <div class="dna-strand new" id="dnaNew">
                                <div class="dna-label">NEW</div>
                                <div class="dna-archetype" id="newArchLabel">Esportivo</div>
                                <div class="dna-percent">75%</div>
                            </div>
                        </div>

                        <!-- DNA Bars -->
                        <div class="dna-bars" id="dnaBars">
                            <!-- Generated by JS -->
                        </div>
                    </div>

                    <!-- Before/After Comparison -->
                    <div class="comparison">
                        <div class="panel-title">BEFORE / AFTER</div>
                        <div class="comparison-bars" id="comparisonBars">
                            <!-- Generated by JS -->
                        </div>
                    </div>
                </div>

                <!-- Center: Archetype Selector -->
                <div class="panel selector-panel">
                    <div class="panel-title">TARGET ARCHETYPE</div>
                    <div class="archetype-grid" id="archetypeGrid">
                        <!-- Generated by JS -->
                    </div>

                    <div class="panel-title" style="margin-top: 16px;">SUB-ARCHETYPE</div>
                    <div class="subarch-grid" id="subArchGrid">
                        <!-- Generated by JS -->
                    </div>
                </div>

                <!-- Right: Stat Adjustments -->
                <div class="panel adjust-panel">
                    <div class="panel-title">STAT FINE-TUNING</div>
                    <div class="adjustments" id="adjustments">
                        <!-- Generated by JS -->
                    </div>

                    <div class="adjust-info">
                        <div class="info-icon">ℹ️</div>
                        <div class="info-text">Adjust stats within ±15 points. Trade one stat for another.</div>
                    </div>

                    <div class="confirm-area">
                        <button class="btn-confirm" id="btnConfirm">
                            <span class="btn-icon">⚡</span>
                            <span>APPLY REMAP</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
