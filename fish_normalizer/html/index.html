<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fish Normalizer</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app" class="hidden">
        <div class="normalizer-container">
            <!-- Header -->
            <div class="header">
                <div class="header-left">
                    <div class="logo">FISH<span class="accent">NORMALIZER</span></div>
                    <div class="version">v1.0</div>
                </div>
                <div class="header-center">
                    <div class="vehicle-name" id="vehicleName">VEHICLE NAME</div>
                    <div class="plate" id="plateDisplay">PLATE</div>
                </div>
                <div class="header-right">
                    <button class="btn-close" id="btnClose">✕</button>
                </div>
            </div>

            <!-- Main Content -->
            <div class="main-content">
                <!-- Left Panel: Stats -->
                <div class="panel stats-panel">
                    <div class="panel-title">PERFORMANCE METRICS</div>

                    <!-- Score Display -->
                    <div class="score-display">
                        <div class="score-ring" id="scoreRing">
                            <svg viewBox="0 0 120 120">
                                <circle class="score-ring-bg" cx="60" cy="60" r="54"></circle>
                                <circle class="score-ring-fill" id="scoreRingFill" cx="60" cy="60" r="54"></circle>
                            </svg>
                            <div class="score-value" id="scoreValue">0</div>
                            <div class="score-label">SCORE</div>
                        </div>
                        <div class="rank-badge" id="rankBadge">C</div>
                    </div>

                    <!-- Stats Bars -->
                    <div class="stats-bars">
                        <div class="stat-row">
                            <div class="stat-label">
                                <span class="stat-icon">⚡</span>
                                <span>TOP SPEED</span>
                            </div>
                            <div class="stat-bar-container">
                                <div class="stat-bar" id="barTopSpeed" style="width: 0%"></div>
                            </div>
                            <div class="stat-value" id="valTopSpeed">0</div>
                        </div>
                        <div class="stat-row">
                            <div class="stat-label">
                                <span class="stat-icon">🚀</span>
                                <span>ACCELERATION</span>
                            </div>
                            <div class="stat-bar-container">
                                <div class="stat-bar accel" id="barAccel" style="width: 0%"></div>
                            </div>
                            <div class="stat-value" id="valAccel">0</div>
                        </div>
                        <div class="stat-row">
                            <div class="stat-label">
                                <span class="stat-icon">🎯</span>
                                <span>HANDLING</span>
                            </div>
                            <div class="stat-bar-container">
                                <div class="stat-bar handling" id="barHandling" style="width: 0%"></div>
                            </div>
                            <div class="stat-value" id="valHandling">0</div>
                        </div>
                        <div class="stat-row">
                            <div class="stat-label">
                                <span class="stat-icon">🛑</span>
                                <span>BRAKING</span>
                            </div>
                            <div class="stat-bar-container">
                                <div class="stat-bar braking" id="barBraking" style="width: 0%"></div>
                            </div>
                            <div class="stat-value" id="valBraking">0</div>
                        </div>
                    </div>

                    <!-- Radar Chart -->
                    <div class="radar-container">
                        <canvas id="radarChart" width="250" height="250"></canvas>
                    </div>
                </div>

                <!-- Center Panel: Archetype Selection -->
                <div class="panel archetype-panel">
                    <div class="panel-title">SELECT ARCHETYPE</div>
                    <div class="archetype-grid" id="archetypeGrid">
                        <!-- Archetype cards will be populated by JS -->
                    </div>
                </div>

                <!-- Right Panel: Sub-Archetype -->
                <div class="panel subarch-panel">
                    <div class="panel-title">PREPARATION TYPE</div>
                    <div class="subarch-grid" id="subArchGrid">
                        <!-- Sub-archetype cards will be populated by JS -->
                    </div>

                    <!-- Confirm Button -->
                    <div class="confirm-area">
                        <button class="btn-confirm" id="btnConfirm">
                            <span class="btn-icon">✓</span>
                            <span>CONFIRM NORMALIZATION</span>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Archetype Detail Overlay -->
            <div class="archetype-detail hidden" id="archetypeDetail">
                <div class="detail-header">
                    <span class="detail-icon" id="detailIcon"></span>
                    <span class="detail-title" id="detailTitle"></span>
                </div>
                <div class="detail-description" id="detailDesc"></div>
                <div class="detail-columns">
                    <div class="detail-col pros">
                        <div class="detail-col-title">ADVANTAGES</div>
                        <ul id="detailPros"></ul>
                    </div>
                    <div class="detail-col cons">
                        <div class="detail-col-title">DISADVANTAGES</div>
                        <ul id="detailCons"></ul>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
