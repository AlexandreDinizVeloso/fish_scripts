<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FISH Hub — Community Market</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Share+Tech+Mono&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Sharp:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{background:transparent!important}
:root{
  --bg:#070810;--bg2:#0d0e1a;--bg3:#131528;
  --glass:rgba(255,255,255,0.03);--border:rgba(255,255,255,0.07);
  --cyan:#00d4ff;--orange:#ff6b00;--green:#00ff88;--red:#ff1744;--purple:#a855f7;--yellow:#ffd600;
  --text:#e8eaf6;--muted:rgba(232,234,246,0.4);
  --mono:'Share Tech Mono',monospace;--sans:'Space Grotesk',sans-serif;--orb:'Orbitron',sans-serif;
}
body{font-family:var(--sans);background:transparent;color:var(--text);height:100vh;width:100vw;display:none;align-items:center;justify-content:center;overflow:hidden}
body.visible{display:flex}

.wrap{width:980px;height:88vh;background:linear-gradient(145deg,#0d0f1e,#070810);border:1px solid rgba(168,85,247,0.12);border-radius:16px;box-shadow:0 0 80px rgba(168,85,247,0.05),inset 0 1px 0 rgba(255,255,255,0.04);overflow:hidden;display:grid;grid-template-columns:220px 1fr;grid-template-rows:auto 1fr auto}

/* Sidebar */
.sidebar{grid-row:1/-1;border-right:1px solid var(--border);display:flex;flex-direction:column;background:rgba(0,0,0,0.2)}
.sidebar-header{padding:14px 16px;border-bottom:1px solid var(--border)}
.sidebar-logo{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.logo-icon{width:28px;height:28px;background:linear-gradient(135deg,var(--purple),var(--cyan));border-radius:7px;display:flex;align-items:center;justify-content:center}
.logo-text{font-family:var(--orb);font-size:12px;letter-spacing:2px;color:var(--purple)}
.player-card{background:rgba(168,85,247,0.06);border:1px solid rgba(168,85,247,0.15);border-radius:8px;padding:8px 10px}
.player-name{font-size:12px;font-weight:600;margin-bottom:4px}
.chip-row{display:flex;gap:4px}
.chip-badge{font-family:var(--mono);font-size:9px;padding:2px 6px;border-radius:4px;border:1px solid}
.chip-v1{border-color:var(--cyan);color:var(--cyan);background:rgba(0,212,255,0.08)}
.chip-v2{border-color:var(--red);color:var(--red);background:rgba(255,23,68,0.08)}
.chip-none{border-color:var(--border);color:var(--muted)}

.nav{padding:8px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;cursor:pointer;transition:all 0.2s;color:var(--muted);font-size:13px;font-weight:500;margin-bottom:2px}
.nav-item:hover{background:rgba(255,255,255,0.04);color:var(--text)}
.nav-item.active{background:rgba(168,85,247,0.1);color:var(--purple)}
.nav-item .material-symbols-sharp{font-size:18px!important}
.nav-item .nav-badge{margin-left:auto;font-family:var(--mono);font-size:9px;padding:2px 5px;background:rgba(255,23,68,0.15);border:1px solid rgba(255,23,68,0.3);border-radius:4px;color:var(--red)}
.nav-sep{height:1px;background:var(--border);margin:6px 8px}
.nav-section-label{font-family:var(--mono);font-size:9px;text-transform:uppercase;letter-spacing:2px;color:var(--muted);padding:6px 12px}

.sidebar-bottom{margin-top:auto;padding:10px}
.btn-install-chip{width:100%;padding:9px;border-radius:8px;background:rgba(168,85,247,0.08);border:1px solid rgba(168,85,247,0.25);color:var(--purple);font-family:var(--sans);font-size:12px;font-weight:500;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:6px}
.btn-install-chip:hover{background:rgba(168,85,247,0.15)}
.material-symbols-sharp{font-size:16px!important}

/* Header */
.main-header{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:rgba(0,0,0,0.1)}
.main-title{font-size:14px;font-weight:600}
.main-title span{color:var(--muted);font-weight:400;font-size:12px;margin-left:8px}
.btn-close{background:rgba(255,255,255,0.05);border:1px solid var(--border);color:var(--muted);border-radius:8px;width:28px;height:28px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s}
.btn-close:hover{background:rgba(255,23,68,0.15);color:var(--red)}

/* Main Content */
.main-content{overflow-y:auto;padding:16px 20px}

/* ── Marketplace ── */
.market-filters{display:flex;gap:8px;margin-bottom:14px}
.filter-btn{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:var(--sans);font-size:11px;cursor:pointer;transition:all 0.2s}
.filter-btn.active{background:rgba(168,85,247,0.1);border-color:var(--purple);color:var(--purple)}
.filter-btn.illegal-filter.active{background:rgba(255,23,68,0.1);border-color:var(--red);color:var(--red)}

.listings-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.listing-card{background:rgba(255,255,255,0.02);border:1px solid var(--border);border-radius:10px;padding:12px;transition:all 0.2s;cursor:pointer}
.listing-card:hover{border-color:rgba(168,85,247,0.3);transform:translateY(-1px)}
.listing-card.illegal{border-color:rgba(255,23,68,0.15)}
.listing-card.illegal:hover{border-color:rgba(255,23,68,0.4)}
.listing-top{display:flex;justify-content:space-between;align-items:start;margin-bottom:8px}
.listing-level{font-family:var(--mono);font-size:10px;padding:2px 7px;border-radius:4px}
.listing-price{font-family:var(--orb);font-size:15px;font-weight:700;color:var(--green)}
.listing-name{font-size:12px;font-weight:600;margin-bottom:4px}
.listing-desc{font-size:10px;color:var(--muted);line-height:1.5}
.listing-seller{font-family:var(--mono);font-size:9px;color:var(--muted);margin-top:8px}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;color:var(--muted);text-align:center;gap:10px;grid-column:1/-1}
.empty-state .material-symbols-sharp{font-size:40px!important;color:rgba(168,85,247,0.3)}
.empty-state h3{font-size:14px;color:rgba(255,255,255,0.3);font-family:var(--orb);letter-spacing:1px}

/* ── Chat ── */
.chat-wrap{display:flex;height:100%;flex-direction:column}
.chat-channels{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.channel-btn{padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:var(--mono);font-size:11px;cursor:pointer;transition:all 0.2s}
.channel-btn.active{background:rgba(0,212,255,0.1);border-color:var(--cyan);color:var(--cyan)}
.channel-btn.illegal.active{background:rgba(255,23,68,0.1);border-color:var(--red);color:var(--red)}
.chat-messages{flex:1;overflow-y:auto;padding:8px 0;display:flex;flex-direction:column;gap:6px;max-height:calc(88vh - 260px)}
.chat-msg{display:flex;flex-direction:column;gap:2px}
.chat-msg-header{display:flex;gap:8px;align-items:baseline}
.chat-sender{font-size:11px;font-weight:600;color:var(--cyan)}
.chat-time{font-family:var(--mono);font-size:9px;color:var(--muted)}
.chat-text{font-size:12px;line-height:1.5;color:var(--text);padding-left:0}
.chat-msg.mine .chat-sender{color:var(--green)}
.chat-msg.system .chat-sender{color:var(--purple)}
.chat-msg.system .chat-text{color:var(--muted);font-style:italic}
.chat-input-row{display:flex;gap:8px;margin-top:10px;border-top:1px solid var(--border);padding-top:10px}
.chat-input{flex:1;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);font-family:var(--sans);font-size:12px;outline:none;transition:border-color 0.2s}
.chat-input:focus{border-color:rgba(0,212,255,0.3)}
.btn-send{padding:8px 16px;border-radius:8px;background:rgba(0,212,255,0.1);border:1px solid rgba(0,212,255,0.3);color:var(--cyan);font-family:var(--sans);font-size:12px;cursor:pointer;transition:all 0.2s;white-space:nowrap}
.btn-send:hover{background:rgba(0,212,255,0.2)}

/* ── HEAT Ranking ── */
.heat-table{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:12px}
.heat-table th{color:var(--muted);font-size:9px;text-transform:uppercase;letter-spacing:1px;text-align:left;padding:6px 10px;border-bottom:1px solid var(--border)}
.heat-table td{padding:10px;border-bottom:1px solid rgba(255,255,255,0.03)}
.heat-table tr:hover td{background:rgba(255,255,255,0.02)}
.heat-rank-num{font-family:var(--orb);font-weight:700;font-size:14px}
.heat-bar-mini{height:4px;border-radius:2px;min-width:20px;max-width:120px}

/* Footer */
.main-footer{padding:10px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;background:rgba(0,0,0,0.1)}
.btn{display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:8px;border:1px solid;cursor:pointer;font-family:var(--sans);font-size:12px;font-weight:500;transition:all 0.2s}
.btn-ghost{background:rgba(255,255,255,0.04);border-color:var(--border);color:var(--muted)}
.btn-ghost:hover{background:rgba(255,255,255,0.08);color:var(--text)}
.btn-purple{background:rgba(168,85,247,0.1);border-color:rgba(168,85,247,0.4);color:var(--purple)}
.btn-purple:hover{background:rgba(168,85,247,0.2)}
.btn-red{background:rgba(255,23,68,0.08);border-color:rgba(255,23,68,0.3);color:var(--red)}
.btn-red:hover{background:rgba(255,23,68,0.15)}
</style>
</head>
<body>
<div class="wrap">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">
        <div class="logo-icon"><span class="material-symbols-sharp">hub</span></div>
        <span class="logo-text">FISH HUB</span>
      </div>
      <div class="player-card">
        <div class="player-name" id="playerName">—</div>
        <div class="chip-row" id="chipRow">
          <span class="chip-badge chip-none">No Chip</span>
        </div>
      </div>
    </div>

    <div class="nav">
      <div class="nav-section-label">Legal</div>
      <div class="nav-item active" data-panel="market-legal" onclick="switchPanel('market-legal',this)">
        <span class="material-symbols-sharp">storefront</span>Marketplace
      </div>
      <div class="nav-item" data-panel="chat" onclick="switchPanel('chat',this)">
        <span class="material-symbols-sharp">forum</span>Community Chat
      </div>
      <div class="nav-item" data-panel="heat" onclick="switchPanel('heat',this)">
        <span class="material-symbols-sharp">local_fire_department</span>HEAT Ranking
      </div>
      <div class="nav-sep"></div>
      <div class="nav-section-label">Underground</div>
      <div class="nav-item" data-panel="market-illegal" onclick="switchPanel('market-illegal',this)" id="navIllegal">
        <span class="material-symbols-sharp">emergency_home</span>Black Market
        <span class="nav-badge">V2</span>
      </div>
      <div class="nav-item" data-panel="chat-illegal" onclick="switchPanel('chat-illegal',this)" id="navUnderground">
        <span class="material-symbols-sharp">lock</span>Underground Chat
        <span class="nav-badge">V2</span>
      </div>
    </div>

    <div class="sidebar-bottom">
      <button class="btn-install-chip" onclick="showChipInstaller()">
        <span class="material-symbols-sharp">memory</span>
        Install Chip
      </button>
    </div>
  </div>

  <!-- Header -->
  <div class="main-header">
    <div>
      <div class="main-title" id="panelTitle">Marketplace <span>Legal Parts & Services</span></div>
    </div>
    <button class="btn-close" onclick="closeNUI()"><span class="material-symbols-sharp">close</span></button>
  </div>

  <!-- Content -->
  <div class="main-content" id="mainContent">
    <div class="empty-state">
      <span class="material-symbols-sharp">storefront</span>
      <h3>LOADING...</h3>
    </div>
  </div>

  <!-- Footer -->
  <div class="main-footer">
    <button class="btn btn-ghost" onclick="closeNUI()">
      <span class="material-symbols-sharp">close</span>Close
    </button>
    <button class="btn btn-purple" id="footerAction">
      <span class="material-symbols-sharp">add</span>Post Listing
    </button>
  </div>
</div>
<script src="script.js"></script>
</body>
</html>
