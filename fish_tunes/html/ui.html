<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        body, html { margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden; background: transparent; }
        iframe { border: none; width: 100%; height: 100%; position: absolute; top: 0; left: 0; display: none; background: transparent; }
        iframe.active { display: block; }
    </style>
</head>
<body>
    <iframe id="frame-tunes" src="index.html"></iframe>
    <iframe id="frame-adv" src="dashboard.html"></iframe>
    <script>
        window.addEventListener('message', (event) => {
            const data = event.data;
            if (data.action === 'closeIframe') {
                document.getElementById('frame-tunes').classList.remove('active');
                document.getElementById('frame-adv').classList.remove('active');
            } else if (data.action === 'openTunes') {
                document.getElementById('frame-tunes').classList.add('active');
                document.getElementById('frame-tunes').contentWindow.postMessage(data, '*');
            } else if (data.action === 'openAdvancedTunes') {
                document.getElementById('frame-adv').classList.add('active');
                document.getElementById('frame-adv').contentWindow.postMessage(data, '*');
            } else {
                // Forward other messages to both iframes (like receiveData, etc)
                document.getElementById('frame-tunes').contentWindow.postMessage(data, '*');
                document.getElementById('frame-adv').contentWindow.postMessage(data, '*');
            }
        });
    </script>
</body>
</html>
