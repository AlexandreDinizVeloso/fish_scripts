<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fish Tunes</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app" class="hidden">
        <div class="tunes-container">
            <div class="header">
                <div class="header-left">
                    <div class="logo">FISH<span class="accent">TUNES</span></div>
                    <div class="version">PARTS DB</div>
                </div>
                <div class="header-center">
                    <div class="vehicle-name" id="vehicleName">VEHICLE</div>
                    <div class="plate" id="plateDisplay">PLATE</div>
                </div>
                <div class="header-right">
                    <div class="heat-display">
                        <div class="heat-label">HEAT</div>
                        <div class="heat-bar-container">
                            <div class="heat-bar" id="heatBar" style="width:0%"></div>
                        </div>
                        <div class="heat-value" id="heatValue">0</div>
                    </div>
                    <button class="btn-close" id="btnClose">✕</button>
                </div>
            </div>

            <div class="main-content">
                <!-- Left: Category Tabs -->
                <div class="panel category-panel">
                    <div class="panel-title">PART CATEGORIES</div>
                    <div class="category-tabs" id="categoryTabs">
                        <!-- Generated by JS -->
                    </div>

                    <!-- Total Stats -->
                    <div class="total-stats">
                        <div class="panel-title">TOTAL BONUSES</div>
                        <div class="total-bars" id="totalBars">
                            <!-- Generated by JS -->
                        </div>
                    </div>
                </div>

                <!-- Center: Level Selector -->
                <div class="panel levels-panel">
                    <div class="panel-title" id="categoryTitle">SELECT PART LEVEL</div>
                    <div class="levels-grid" id="levelsGrid">
                        <!-- Generated by JS -->
                    </div>

                    <div class="part-info" id="partInfo">
                        <div class="part-info-title">PART DETAILS</div>
                        <div class="part-info-content" id="partInfoContent">
                            Select a part level to see details
                        </div>
                    </div>
                </div>

                <!-- Right: Stats Comparison -->
                <div class="panel compare-panel">
                    <div class="panel-title">STAT COMPARISON</div>
                    <div class="compare-bars" id="compareBars">
                        <!-- Generated by JS -->
                    </div>

                    <div class="warnings" id="warnings">
                        <!-- Generated by JS -->
                    </div>

                    <div class="action-area">
                        <button class="btn-install" id="btnInstall">
                            <span>⚡</span> INSTALL PART
                        </button>
                        <button class="btn-uninstall" id="btnUninstall">
                            <span>🔧</span> REMOVE TO STOCK
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
